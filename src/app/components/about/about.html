<section class="about" aria-labelledby="about-title">
  <div class="about__content">
    <h2 id="about-title" class="about__title">About Me</h2>
    <div class="about__grid">
      <div class="about__text">
        <p>{{professionalSummary}}</p>
        <p>Location: {{location}}</p>
      </div>
      <div class="about__info">
        <div class="about__section">
          <h3>Core Competencies</h3>
          <ul class="about__list" aria-label="Core competencies">
            <li *ngFor="let c of coreCompetencies">{{c}}</li>
          </ul>
        </div>
        <!-- <div class="about__section">
          <h3>Languages</h3>
          <ul class="about__list" aria-label="Languages spoken">
            <li *ngFor="let language of languages">{{language}}</li>
          </ul>
        </div> -->
      </div>
    </div>
  </div>
</section>
