<section class="hero">
  <div class="hero__content">
    <h1 class="hero__title">
      <span class="hero__greeting">Hi, I'm</span>
      <span class="hero__name">{{name}}</span>
    </h1>
    <h2 class="hero__role">{{role}}</h2>
    <p class="hero__quot">{{quote}}</p>
    <p class="hero__summary">{{summary}}</p>
    <div class="hero__cta">
      <a routerLink="/contact" class="hero__button">Get in Touch</a>
      <a routerLink="/projects" class="hero__button hero__button--outline">View Projects</a>
    </div>
  </div>
</section>
