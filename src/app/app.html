
<a href="#main-content" class="skip-link">Skip to main content</a>

<nav class="navbar">
  <a class="navbar__logo" routerLink="/" (click)="closeMenu()">SV</a>
  <ul class="navbar__links" [class.navbar__links--open]="isMenuOpen" role="navigation">
    <li><a routerLink="/" [routerLinkActive]="'active'" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Home</a></li>
    <li><a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a></li>
    <li><a routerLink="/experience" routerLinkActive="active" (click)="closeMenu()">Experience</a></li>
    <li><a routerLink="/education" routerLinkActive="active" (click)="closeMenu()">Education</a></li>
    <li><a routerLink="/skills" routerLinkActive="active" (click)="closeMenu()">Skills</a></li>
    <li><a routerLink="/projects" routerLinkActive="active" (click)="closeMenu()">Projects</a></li>
    <li><a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a></li>
  </ul>
  <button type="button" class="navbar__toggle" [class.active]="isMenuOpen" (click)="toggleMenu()" aria-label="Toggle menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
</nav>

<app-loading-indicator *ngIf="loadingStateService.isLoading$ | async" 
                      [fullPage]="true" 
                      text="Loading content...">
</app-loading-indicator>

<app-performance-metrics></app-performance-metrics>
<app-update-notification></app-update-notification>

<main class="app" id="main-content" appErrorBoundary>
  <router-outlet></router-outlet>
</main>
